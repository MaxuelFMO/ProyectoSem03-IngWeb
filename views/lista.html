<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Ventas</title>
  <link rel="stylesheet" href="/assets/lista.css">
</head>
<body>
  <h1>Lista de Ventas</h1>
  <table id="ventasTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Cliente</th>
        <th>Producto</th>
        <th>Cantidad</th>
        <th>Precio</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody>
      <!-- Ventas will be loaded here -->
    </tbody>
  </table>
  <a href="/">Volver</a>

  <script>
    async function loadVentas() {
      try {
        const response = await fetch('/api/listar');
        const ventas = await response.json();
        const tbody = document.querySelector('#ventasTable tbody');
        tbody.innerHTML = '';
        ventas.forEach(venta => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${venta.id}</td>
            <td>${venta.cliente}</td>
            <td>${venta.producto}</td>
            <td>${venta.cantidad}</td>
            <td>${venta.precio}</td>
            <td>${venta.total}</td>
          `;
          tbody.appendChild(row);
        });
      } catch (err) {
        console.error('Error loading ventas:', err);
      }
    }

    loadVentas();
  </script>
</body>
</html>
