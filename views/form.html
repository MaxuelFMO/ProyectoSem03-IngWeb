<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva Venta</title>
  <link rel="stylesheet" href="/assets/form.css">
</head>
<body>
  <h1>Nueva Venta</h1>
  <form id="ventaForm">
    <label for="cliente">Cliente:</label>
    <input type="text" id="cliente" name="cliente" required>

    <label for="producto">Producto:</label>
    <input type="text" id="producto" name="producto" required>

    <label for="cantidad">Cantidad: <span id="cantidad-value">1</span></label>
    <input type="range" id="cantidad" name="cantidad" min="1" max="10" required>

    <label for="precio">Precio: <span id="precio-value">1</span></label>
    <input type="range" id="precio" name="precio" min="1" max="1000" required>

    <button type="button" id="calculate">Calcular</button>
    <button type="submit" id="submit">Guardar</button>
  </form>

  <div class="preview">
    <h2>Total</h2>
    <div id="total">$0.00</div>
  </div>


  <a href="/">Volver</a>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const cantidadInput = document.getElementById('cantidad');
      const precioInput = document.getElementById('precio');
      const cantidadValue = document.getElementById('cantidad-value');
      const precioValue = document.getElementById('precio-value');

      function actualizarVisualizacion() {
        const cantidad = parseInt(cantidadInput.value, 10);
        const precio = parseFloat(precioInput.value);

        cantidadValue.textContent = cantidad;
        precioValue.textContent = precio.toFixed(2);

        cantidadValue.style.visibility = cantidad > 0 ? 'visible' : 'hidden';
        precioValue.style.visibility = precio > 0 ? 'visible' : 'hidden';
      }

      cantidadInput.addEventListener('input', actualizarVisualizacion);
      precioInput.addEventListener('input', actualizarVisualizacion);

      const calculateBtn = document.getElementById('calculate');
      const totalEl = document.getElementById('total');

      calculateBtn.addEventListener('click', function (e) {
        e.preventDefault();
        const cantidad = parseInt(cantidadInput.value, 10);
        const precio = parseFloat(precioInput.value);
        const total = cantidad * precio;
        totalEl.textContent = `$${total.toFixed(2)}`;
      });

      const form = document.getElementById('ventaForm');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Obtener valores directamente para asegurar precisión
        const cliente = document.getElementById('cliente').value.trim();
        const producto = document.getElementById('producto').value.trim();
        const cantidad = parseInt(document.getElementById('cantidad').value, 10);
        const precio = parseFloat(document.getElementById('precio').value);

        // Validación básica
        if (!cliente || !producto || cantidad < 1 || precio <= 0) {
          alert('Por favor, completa todos los campos correctamente');
          return;
        }

        const data = new URLSearchParams({
          cliente,
          producto,
          cantidad: cantidad.toString(),
          precio: precio.toString()
        });

        console.log('Enviando datos:', { cliente, producto, cantidad, precio });

        try {
          const response = await fetch('/api/crear', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: data
          });

          const result = await response.json().catch(() => ({ success: false, error: 'Respuesta inválida del servidor' }));

          if (response.ok && result.success) {
            alert(`¡Venta guardada exitosamente! (ID: ${result.id})`);
            // Limpiar formulario
            form.reset();
            document.getElementById('total').textContent = '$0.00';
            actualizarVisualizacion();
          } else {
            alert(`Error: ${result.error || 'Error al guardar la venta'}`);
          }
        } catch (err) {
          console.error('Error:', err);
          alert(`Error de conexión: ${err.message}`);
        }
      });

      actualizarVisualizacion();
    });
  </script>
</body>
</html>
