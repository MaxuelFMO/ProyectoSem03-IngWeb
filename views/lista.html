<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Ventas</title>
  <link rel="stylesheet" href="/assets/lista.css">
</head>
<body>
  <h1>Lista de Ventas</h1>
  
  <div id="message" class="message"></div>
  
  <table id="ventasTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Cliente</th>
        <th>Producto</th>
        <th>Cantidad</th>
        <th>Precio</th>
        <th>Total</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <!-- Ventas will be loaded here -->
    </tbody>
  </table>
  <a href="/">Volver</a>

  <script>
    let ventas = [];

    // Cargar ventas
    async function loadVentas() {
      try {
        console.log('📊 Cargando ventas...');
        const response = await fetch('/api/listar');
        
        console.log('Status:', response.status);
        
        // Obtener el texto primero
        const text = await response.text();
        console.log('Response text:', text);
        
        // Parsearlo
        let result;
        if (!text || text.trim() === '') {
          result = { success: false, data: [] };
        } else {
          try {
            result = JSON.parse(text);
          } catch (e) {
            console.error('JSON Parse Error:', e);
            result = { success: false, data: [], error: 'Respuesta inválida del servidor' };
          }
        }
        
        ventas = result.data || result;
        
        const tbody = document.querySelector('#ventasTable tbody');
        tbody.innerHTML = '';
        
        if (!ventas || ventas.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 20px;">No hay ventas registradas</td></tr>';
          return;
        }
        
        ventas.forEach(venta => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${venta.id}</td>
            <td>${venta.cliente}</td>
            <td>${venta.producto}</td>
            <td>${venta.cantidad}</td>
            <td>$${parseFloat(venta.precio).toFixed(2)}</td>
            <td>$${parseFloat(venta.total).toFixed(2)}</td>
            <td>
              <div class="actions">
                <button class="btn btn-edit" onclick="editarVenta(${venta.id})">Editar</button>
                <button class="btn btn-delete" onclick="eliminarVenta(${venta.id})">Eliminar</button>
              </div>
            </td>
          `;
          tbody.appendChild(row);
        });
      } catch (err) {
        console.error('❌ Error:', err);
        showMessage('Error al cargar ventas: ' + err.message, 'error');
      }
    }

    // Editar venta con prompts
    async function editarVenta(id) {
      const venta = ventas.find(v => v.id === id);
      if (!venta) {
        alert('Venta no encontrada');
        return;
      }
      
      const cliente = prompt('Editar Cliente:', venta.cliente);
      if (cliente === null) return;
      
      const producto = prompt('Editar Producto:', venta.producto);
      if (producto === null) return;
      
      const cantidadStr = prompt('Editar Cantidad:', venta.cantidad);
      if (cantidadStr === null) return;
      const cantidad = parseInt(cantidadStr);
      
      const precioStr = prompt('Editar Precio:', venta.precio);
      if (precioStr === null) return;
      const precio = parseFloat(precioStr);

      if (isNaN(cantidad) || isNaN(precio)) {
        alert('Cantidad o Precio no válidos');
        return;
      }

      try {
        const response = await fetch('/api/editar', {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
          },
          body: new URLSearchParams({
            id, cliente, producto, cantidad, precio
          })
        });
        
        const result = await response.json();
        
        if (response.ok && result.success) {
          alert('Venta actualizada correctamente');
          loadVentas();
        } else {
          alert('Error: ' + (result.error || 'Error al actualizar'));
        }
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    // Eliminar venta
    async function eliminarVenta(id) {
      if (!confirm('¿Está seguro de que desea eliminar esta venta?')) {
        return;
      }
      
      try {
        const response = await fetch('/api/eliminar', {
          method: 'DELETE',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
          },
          body: new URLSearchParams({ id })
        });
        
        const result = await response.json();
        
        if (response.ok && result.success) {
          showMessage('Venta eliminada correctamente', 'success');
          loadVentas();
        } else {
          showMessage('Error: ' + (result.error || 'Error al eliminar'), 'error');
        }
      } catch (err) {
        showMessage('Error: ' + err.message, 'error');
      }
    }

    // Mostrar mensajes con alert
    function showMessage(msg, type) {
      alert(msg);
    }



    // Cargar al iniciar
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadVentas);
    } else {
      loadVentas();
    }
  </script>
</body>
</html>
