<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juancho no hace tareas</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <h1>Sistema de ventas</h1>
  <div class="container">
    <form method="POST" action="/submit">
      <label for="name">Cliente:</label>
      <input type="text" id="name" name="cliente" required>

      <label for="producto">Producto:</label>
      <input type="text" id="producto" name="producto" required>

      <label for="count">Cantidad: <span id="count-value">1</span></label>
      <input type="range" name="cantidad" id="count" min="1" max="10" required>
      
      <label for="precio">Precio: <span id="precio-value">1</span></label>
      <input type="range" name="precio" id="precio" min="1" max="1000" required>

      <button type="button" id="calculate">Calcular</button>
      <button type="submit" id="submit">Enviar</button>
    </form>

    <div class="preview">
      <h2>Total</h2>
      <ul id="total">$0.00</ul>
    </div>
  </div>
  
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const countInput = document.getElementById('count');
      const precioInput = document.getElementById('precio');
      const countValue = document.getElementById('count-value');
      const precioValue = document.getElementById('precio-value');
      const totalEl = document.getElementById('total');
      const calculateBtn = document.getElementById('calculate');

      function actualizarVisualizacion() {
        const cantidad = parseInt(countInput.value, 10);
        const precio = parseFloat(precioInput.value);

        countValue.textContent = cantidad;
        precioValue.textContent = precio.toFixed(2);

        countValue.style.visibility = cantidad > 0 ? 'visible' : 'hidden';
        precioValue.style.visibility = precio > 0 ? 'visible' : 'hidden';
      }

      countInput.addEventListener('input', actualizarVisualizacion);
      precioInput.addEventListener('input', actualizarVisualizacion);

      calculateBtn.addEventListener('click', function (e) {
        e.preventDefault();
        const cantidad = parseInt(countInput.value, 10);
        const precio = parseFloat(precioInput.value);
        const total = cantidad * precio;
        totalEl.textContent = `$${total.toFixed(2)}`;
      });

      actualizarVisualizacion();
    });
  </script>
</body>
</html>
